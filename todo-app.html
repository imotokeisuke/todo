<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>台帳 — タスク管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F1E9;
    --paper:#FFFFFF;
    --ink:#26262B;
    --ink-soft:#726F66;
    --ink-faint:#A6A296;
    --line:#E1DCCC;
    --line-strong:#CBC4AE;
    --accent:#33566F;
    --accent-soft:#E3EBEE;
    --accent-deep:#203B4C;
    --do:#4C8C6B;
    --do-bg:#DEEEE3;
    --due:#D69A2D;
    --due-bg:#FAEBCB;
    --gray:#C9C6BE;
    --gray-bg:#ECEAE2;
    --danger:#B8503F;
    --danger-bg:#F5E1DC;
    --radius:16px;
    --radius-sm:10px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:#DCD6C4;
    font-family:'Noto Sans JP','Zen Kaku Gothic New',sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  .phone{
    width:100%;
    max-width:430px;
    min-height:100vh;
    background:var(--bg);
    position:relative;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 40px rgba(0,0,0,0.25);
    background-image:
      linear-gradient(var(--bg),var(--bg)),
      repeating-linear-gradient(0deg, rgba(51,86,111,0.035) 0px, rgba(51,86,111,0.035) 1px, transparent 1px, transparent 28px),
      repeating-linear-gradient(90deg, rgba(51,86,111,0.035) 0px, rgba(51,86,111,0.035) 1px, transparent 1px, transparent 28px);
  }
  .topbar{
    padding:22px 20px 16px;
    position:sticky;
    top:0;
    z-index:5;
    background:linear-gradient(180deg, var(--bg) 80%, rgba(244,241,233,0));
  }
  .topbar .eyebrow{
    font-family:'Zen Kaku Gothic New',sans-serif;
    font-size:11px;
    letter-spacing:.18em;
    color:var(--ink-faint);
    text-transform:uppercase;
    margin:0 0 2px;
  }
  .topbar h1{
    font-family:'Zen Maru Gothic',sans-serif;
    font-weight:900;
    font-size:23px;
    margin:0;
    color:var(--accent-deep);
    letter-spacing:.02em;
  }
  .title-row{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .title-edit-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    width:26px;height:26px;
    border-radius:8px;
    border:none;
    background:var(--accent-soft);
    color:var(--accent);
    cursor:pointer;
    flex-shrink:0;
  }
  .title-edit-btn svg{width:14px;height:14px;}
  .title-edit-btn.hidden{display:none;}
  .storage-warning{
    background:var(--due-bg);
    color:#7A5416;
    font-size:11.5px;
    font-weight:700;
    line-height:1.5;
    text-align:center;
    padding:9px 16px;
    border-bottom:1px solid var(--due);
  }
  .storage-warning.hidden{display:none;}
  .screen{
    flex:1;
    padding:0 20px 110px;
    overflow-y:auto;
  }
  .screen::-webkit-scrollbar{display:none;}

  /* ---- card / section basics ---- */
  .card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:16px;
  }
  .section-title{
    font-family:'Zen Maru Gothic',sans-serif;
    font-weight:700;
    font-size:13px;
    color:var(--accent);
    letter-spacing:.06em;
    margin:0 0 10px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .section-title .num{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:18px;height:18px;
    border-radius:5px;
    background:var(--accent);
    color:#fff;
    font-size:10px;
    font-weight:700;
  }

  /* ---- buttons ---- */
  .btn{
    font-family:'Zen Kaku Gothic New',sans-serif;
    font-weight:700;
    font-size:14px;
    border:none;
    border-radius:12px;
    padding:13px 18px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    transition:transform .08s ease, opacity .15s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--accent);color:#fff;width:100%;}
  .btn-outline{background:var(--paper);color:var(--accent);border:1.5px solid var(--accent);}
  .btn-danger{background:var(--danger-bg);color:var(--danger);}
  .btn-do{background:var(--do-bg);color:var(--do);}
  .btn-to{background:var(--gray-bg);color:var(--ink-soft);}
  .btn-sm{padding:9px 12px;font-size:12.5px;border-radius:9px;}
  .btn-block{width:100%;}
  .btn-row{display:flex;gap:8px;margin-top:14px;}
  .btn-row .btn{flex:1;}

  /* ---- today panel ---- */
  .today-date{
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:15px;
    font-weight:700;
    color:var(--ink);
    margin-bottom:10px;
  }
  .today-empty{
    color:var(--ink-faint);
    font-size:13px;
    padding:6px 2px;
  }

  /* ---- TO card (ledger tab style) ---- */
  .to-item{
    position:relative;
    display:flex;
    align-items:center;
    gap:12px;
    background:var(--paper);
    border:1px solid var(--line);
    border-left:6px solid var(--gray);
    border-radius:var(--radius-sm);
    padding:12px 14px 12px 12px;
    margin-bottom:10px;
    cursor:pointer;
  }
  .to-item.status-do{border-left-color:var(--do); background:var(--do-bg);}
  .to-item.status-due{border-left-color:var(--due); background:var(--due-bg);}
  .to-item .to-main{flex:1; min-width:0;}
  .to-item .to-title{
    font-weight:700;
    font-size:14.5px;
    color:var(--ink);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .to-item .to-meta{
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:3px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .to-item .to-badge{
    font-size:10px;
    font-weight:700;
    padding:2px 7px;
    border-radius:20px;
    background:var(--accent-soft);
    color:var(--accent);
    white-space:nowrap;
  }
  .to-item.status-do .to-badge{background:var(--do);color:#fff;}
  .to-item.status-due .to-badge{background:var(--due);color:#fff;}

  /* ---- dropdown ---- */
  select, input[type=text], input[type=date], input[type=url], textarea{
    width:100%;
    font-family:'Noto Sans JP',sans-serif;
    font-size:14.5px;
    padding:11px 12px;
    border-radius:10px;
    border:1.5px solid var(--line-strong);
    background:var(--paper);
    color:var(--ink);
    outline:none;
  }
  select:focus, input:focus, textarea:focus{border-color:var(--accent);}
  label.field-label{
    display:block;
    font-size:12px;
    font-weight:700;
    color:var(--ink-soft);
    margin:14px 0 6px;
  }
  label.field-label:first-child{margin-top:0;}
  textarea{resize:vertical;min-height:70px;}

  /* ---- item chip (item list) ---- */
  .item-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    padding:14px;
    margin-bottom:10px;
  }
  .item-row .item-name{
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    flex:1;
  }
  .item-row .item-sub{
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:2px;
  }

  /* ---- empty state ---- */
  .empty-state{
    text-align:center;
    padding:34px 14px;
    color:var(--ink-faint);
    font-size:13px;
  }
  .empty-state .glyph{font-size:26px;margin-bottom:8px;}

  /* ---- bar chart ---- */
  .bar-row{margin-bottom:12px;}
  .bar-row .bar-label{
    display:flex;
    justify-content:space-between;
    font-size:12.5px;
    font-weight:700;
    margin-bottom:5px;
  }
  .bar-row .bar-label .cnt{color:var(--ink-soft);font-weight:500;font-size:11.5px;}
  .bar-track{
    display:flex;
    height:14px;
    border-radius:8px;
    overflow:hidden;
    background:var(--gray-bg);
    width:100%;
  }
  .bar-do{background:var(--do);}
  .bar-to{background:var(--gray);}

  /* ---- legend ---- */
  .legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:12px;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-soft);}
  .legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

  /* ---- calendar ---- */
  .cal-nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .cal-nav .cal-title{
    font-family:'Zen Maru Gothic',sans-serif;
    font-weight:700;
    font-size:16px;
    color:var(--accent-deep);
  }
  .cal-nav button{
    background:var(--accent-soft);
    color:var(--accent);
    border:none;
    width:32px;height:32px;
    border-radius:9px;
    font-size:16px;
    cursor:pointer;
  }
  .cal-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:4px;
  }
  .cal-wd{
    text-align:center;
    font-size:11px;
    color:var(--ink-faint);
    font-weight:700;
    padding-bottom:4px;
  }
  .cal-cell{
    aspect-ratio:1/1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    font-size:12.5px;
    cursor:pointer;
    color:var(--ink);
    position:relative;
    background:transparent;
  }
  .cal-cell.other-month{color:var(--ink-faint);opacity:.4;}
  .cal-cell.today{border:1.5px solid var(--accent);font-weight:700;}
  .cal-cell.selected{background:var(--accent);color:#fff;}
  .cal-dot{
    width:6px;height:6px;
    border-radius:50%;
    margin-top:3px;
    background:var(--gray);
  }
  .cal-dot.all-done{background:var(--do);}
  .cal-cell.selected .cal-dot{background:#fff;}

  .cal-daylist-title{
    font-size:13px;
    font-weight:700;
    color:var(--accent);
    margin:20px 0 10px;
  }

  /* ---- pie chart ---- */
  .pie-wrap{display:flex;align-items:center;gap:18px;}
  .pie-wrap svg{flex-shrink:0;}

  /* ---- tabbar ---- */
  .tabbar{
    position:fixed;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    max-width:430px;
    display:flex;
    background:rgba(255,255,255,0.92);
    backdrop-filter:blur(10px);
    border-top:1px solid var(--line);
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    z-index:20;
  }
  .tab-btn{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
    background:none;
    border:none;
    padding:6px 2px;
    cursor:pointer;
    color:var(--ink-faint);
    font-size:10.5px;
    font-family:'Zen Kaku Gothic New',sans-serif;
    font-weight:700;
  }
  .tab-btn.active{color:var(--accent);}
  .tab-btn svg{width:22px;height:22px;}

  /* ---- modal ---- */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(38,38,43,0.45);
    display:flex;
    align-items:flex-end;
    justify-content:center;
    z-index:50;
    opacity:1;
    transition:opacity .15s ease;
  }
  .modal-overlay.hidden{display:none;}
  .modal-content{
    width:100%;
    max-width:430px;
    background:var(--bg);
    border-radius:22px 22px 0 0;
    padding:20px 20px calc(24px + env(safe-area-inset-bottom));
    max-height:88vh;
    overflow-y:auto;
    animation:slideUp .2s ease;
  }
  @keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .modal-handle{
    width:38px;height:4px;
    background:var(--line-strong);
    border-radius:3px;
    margin:0 auto 14px;
  }
  .modal-title{
    font-family:'Zen Maru Gothic',sans-serif;
    font-weight:700;
    font-size:17px;
    color:var(--accent-deep);
    margin-bottom:4px;
  }
  .modal-close-x{
    position:absolute;
    top:16px; right:18px;
    background:none;border:none;
    font-size:18px;
    color:var(--ink-faint);
    cursor:pointer;
  }
  .field-hint{font-size:11px;color:var(--ink-faint);margin-top:4px;}
</style>
</head>
<body>
<div class="phone">
  <div class="storage-warning hidden" id="storageWarning">
    ⚠️ この開き方だとデータが保存されません。Safariで直接開き「ホーム画面に追加」してからご利用ください。
  </div>
  <div class="topbar">
    <p class="eyebrow" id="topbarEyebrow">LEDGER</p>
    <div class="title-row">
      <h1 id="topbarTitle">台帳</h1>
      <button class="title-edit-btn hidden" id="titleEditBtn" aria-label="タイトルを編集">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
      </button>
    </div>
  </div>
  <div class="screen" id="screen"></div>

  <nav class="tabbar">
    <button class="tab-btn" data-tab="top">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      TOP
    </button>
    <button class="tab-btn" data-tab="schedule">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6h11M9 12h11M9 18h11"/><circle cx="4" cy="6" r="1.6"/><circle cx="4" cy="12" r="1.6"/><circle cx="4" cy="18" r="1.6"/></svg>
      進捗管理
    </button>
    <button class="tab-btn" data-tab="items">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l3-3h5l1 2h9v3H3z"/><path d="M3 7v11a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V9"/></svg>
      アイテム
    </button>
    <button class="tab-btn" data-tab="calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
      カレンダー
    </button>
  </nav>
</div>

<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
/* ==========================================================
   データ層
   ========================================================== */
let appData = { items: [], todos: [], settings: { title: '台帳' } };
let currentTab = 'top';
let selectedItemId = null;      // 進捗管理タブで選択中のアイテム
let calendarViewDate = new Date();
let selectedCalDate = null;

const STORAGE_KEY = 'ledger-app-data';
const ITEM_COLORS = ['#33566F','#4C8C6B','#D69A2D','#B8503F','#7C5AA0','#3A8CA0','#B8763A','#5A7A35','#8C5C7C','#4A7A9E'];

function uid(){ return 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,8); }
function pad(n){ return String(n).padStart(2,'0'); }
function dateToStr(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function todayStr(){ return dateToStr(new Date()); }
const WEEK_JP = ['日','月','火','水','木','金','土'];
function formatDateJP(dateStr){
  if(!dateStr) return '期限未設定';
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(y,m-1,d);
  return `${y}年${m}月${d}日(${WEEK_JP[dt.getDay()]})`;
}
function formatDateShort(dateStr){
  if(!dateStr) return '—';
  const [y,m,d] = dateStr.split('-').map(Number);
  return `${m}/${d}`;
}
function itemColor(itemId){
  const idx = appData.items.findIndex(i=>i.id===itemId);
  return ITEM_COLORS[idx>=0 ? idx % ITEM_COLORS.length : 0];
}
function itemName(itemId){
  const it = appData.items.find(i=>i.id===itemId);
  return it ? it.name : '(削除済みアイテム)';
}
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let storageAvailable = true;

async function loadData(){
  try{
    const raw = window.localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      appData.items = parsed.items || [];
      appData.todos = parsed.todos || [];
      appData.settings = Object.assign({ title: '台帳' }, parsed.settings || {});
    }
  }catch(e){
    // このブラウザ／表示方法では保存機能が使えない
    storageAvailable = false;
    console.error('保存データの読み込みに失敗しました', e);
  }
}
async function saveData(){
  try{
    window.localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
  }catch(e){
    storageAvailable = false;
    console.error('保存に失敗しました', e);
    showStorageWarning();
  }
}
function showStorageWarning(){
  const el = document.getElementById('storageWarning');
  if(el) el.classList.remove('hidden');
}

/* ==========================================================
   TO のステータス判定
   ========================================================== */
function todoStatusClass(todo){
  if(todo.status === 'DO') return 'status-do';
  if(todo.deadline === todayStr()) return 'status-due';
  return '';
}
function todoBadgeText(todo){
  if(todo.status === 'DO') return '完了';
  if(todo.deadline === todayStr()) return '本日期限';
  return '未完了';
}

/* ==========================================================
   タブ切り替え / 描画ルーター
   ========================================================== */
const TAB_META = {
  top:      { eyebrow:'LEDGER', title:'台帳' },
  schedule: { eyebrow:'SCHEDULE', title:'進捗管理' },
  items:    { eyebrow:'COLLECTION', title:'アイテム一覧' },
  calendar: { eyebrow:'CALENDAR', title:'カレンダー' },
};

function switchTab(tab, opts={}){
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab===tab);
  });
  document.getElementById('topbarEyebrow').textContent = TAB_META[tab].eyebrow;
  document.getElementById('topbarTitle').textContent = tab==='top' ? appData.settings.title : TAB_META[tab].title;
  document.getElementById('titleEditBtn').classList.toggle('hidden', tab!=='top');
  render();
}

function render(){
  const screen = document.getElementById('screen');
  if(currentTab==='top') screen.innerHTML = renderTop();
  else if(currentTab==='schedule') screen.innerHTML = renderSchedule();
  else if(currentTab==='items') screen.innerHTML = renderItems();
  else if(currentTab==='calendar') screen.innerHTML = renderCalendar();
  attachScreenEvents();
}

/* ==========================================================
   TOP 画面
   ========================================================== */
function renderTop(){
  const today = todayStr();
  const todayTodos = appData.todos
    .filter(t=>t.deadline===today)
    .sort((a,b)=> a.status===b.status ? 0 : (a.status==='DO'?1:-1));

  let todayHtml = '';
  if(todayTodos.length===0){
    todayHtml = `<p class="today-empty">本日期限のTOはありません。</p>`;
  }else{
    todayHtml = todayTodos.map(t=>renderTodoCard(t)).join('');
  }

  // 完了(DO)数を集計
  const itemStats = appData.items.map(it=>{
    const todos = appData.todos.filter(t=>t.itemId===it.id);
    const doCount = todos.filter(t=>t.status==='DO').length;
    const toCount = todos.filter(t=>t.status!=='DO').length;
    return { item: it, doCount, toCount, total: doCount+toCount };
  });

  const pieData = itemStats.filter(s=>s.doCount>0);
  const pieTotal = pieData.reduce((sum,s)=>sum+s.doCount,0);

  let pieSvg;
  if(pieTotal===0){
    pieSvg = `<div class="empty-state"><div class="glyph">◌</div>完了したタスクがまだありません</div>`;
  }else{
    const r=62, cx=76, cy=76, sw=26;
    const circumference = 2*Math.PI*r;
    let offsetAcc = 0;
    let circles = '';
    pieData.forEach(s=>{
      const frac = s.doCount/pieTotal;
      const dash = frac*circumference;
      circles += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${itemColor(s.item.id)}" stroke-width="${sw}"
        stroke-dasharray="${dash} ${circumference-dash}" stroke-dashoffset="${-offsetAcc}"
        transform="rotate(-90 ${cx} ${cy})" stroke-linecap="butt"/>`;
      offsetAcc += dash;
    });
    const legend = pieData.map(s=>`
      <div class="legend-item">
        <span class="legend-dot" style="background:${itemColor(s.item.id)}"></span>
        ${escapeHtml(s.item.name)} (${s.doCount})
      </div>`).join('');
    pieSvg = `
      <div class="pie-wrap">
        <svg width="152" height="152" viewBox="0 0 152 152">${circles}
          <text x="76" y="72" text-anchor="middle" font-size="20" font-weight="700" fill="var(--ink)">${pieTotal}</text>
          <text x="76" y="90" text-anchor="middle" font-size="10" fill="var(--ink-soft)">完了タスク</text>
        </svg>
        <div class="legend" style="flex-direction:column;margin-top:0;">${legend}</div>
      </div>`;
  }

  // 横棒グラフ（DO数の多い順）
  const barData = [...itemStats].filter(s=>s.total>0).sort((a,b)=> b.doCount-a.doCount);
  const maxTotal = Math.max(1, ...barData.map(s=>s.total));
  let barsHtml;
  if(barData.length===0){
    barsHtml = `<div class="empty-state"><div class="glyph">▭</div>アイテムを作成してTOを登録しましょう</div>`;
  }else{
    barsHtml = barData.map(s=>{
      const doPct = (s.doCount/maxTotal*100).toFixed(1);
      const toPct = (s.toCount/maxTotal*100).toFixed(1);
      return `
      <div class="bar-row">
        <div class="bar-label">
          <span>${escapeHtml(s.item.name)}</span>
          <span class="cnt">DO ${s.doCount} / TO ${s.toCount}</span>
        </div>
        <div class="bar-track">
          <div class="bar-do" style="width:${doPct}%"></div>
          <div class="bar-to" style="width:${toPct}%"></div>
        </div>
      </div>`;
    }).join('');
  }

  return `
    <div class="card">
      <p class="section-title"><span class="num">1</span>${formatDateJP(today)}・本日期限のTO</p>
      ${todayHtml}
    </div>

    <button class="btn btn-primary btn-block" id="btnCreateItemTop">＋ アイテム作成</button>

    <div class="card" style="margin-top:16px;">
      <p class="section-title"><span class="num">2</span>完了タスクの内訳</p>
      ${pieSvg}
    </div>

    <div class="card">
      <p class="section-title"><span class="num">3</span>アイテム別 進捗（DO多い順）</p>
      ${barsHtml}
    </div>
  `;
}

/* 共通: TOカードのHTML */
function renderTodoCard(t, showItemName=true){
  const cls = todoStatusClass(t);
  return `
    <div class="to-item ${cls}" data-open-todo="${t.id}">
      <div class="to-main">
        <div class="to-title">${escapeHtml(t.title)}</div>
        <div class="to-meta">
          ${showItemName ? `<span>${escapeHtml(itemName(t.itemId))}</span>` : ''}
          <span>期限 ${formatDateShort(t.deadline)}</span>
        </div>
      </div>
      <span class="to-badge">${todoBadgeText(t)}</span>
    </div>`;
}

/* ==========================================================
   進捗管理（スケジュール管理）画面
   ========================================================== */
function renderSchedule(){
  if(appData.items.length===0){
    return `
      <div class="empty-state">
        <div class="glyph">🗂</div>
        まだアイテムがありません。<br>「アイテム」タブから作成してください。
      </div>
      <button class="btn btn-outline btn-block" id="btnGoItems">アイテム一覧へ</button>
    `;
  }

  if(!selectedItemId || !appData.items.find(i=>i.id===selectedItemId)){
    selectedItemId = appData.items[0].id;
  }

  const options = appData.items.map(it=>
    `<option value="${it.id}" ${it.id===selectedItemId?'selected':''}>${escapeHtml(it.name)}</option>`
  ).join('');

  const todos = appData.todos
    .filter(t=>t.itemId===selectedItemId)
    .sort((a,b)=> (a.deadline||'9999-99-99').localeCompare(b.deadline||'9999-99-99'));

  const listHtml = todos.length===0
    ? `<div class="empty-state"><div class="glyph">✎</div>この アイテムにはまだTOがありません。</div>`
    : todos.map(t=>renderTodoCard(t, false)).join('');

  return `
    <div class="card">
      <p class="section-title"><span class="num">1</span>アイテムを選択</p>
      <select id="itemSelect">${options}</select>
    </div>
    <button class="btn btn-primary btn-block" id="btnCreateTodo">＋ TO作成</button>
    <div style="margin-top:18px;">
      <p class="section-title"><span class="num">2</span>期限日順の一覧</p>
      ${listHtml}
    </div>
  `;
}

/* ==========================================================
   アイテム一覧画面
   ========================================================== */
function renderItems(){
  if(appData.items.length===0){
    return `<div class="empty-state"><div class="glyph">🗂</div>まだアイテムがありません。下のボタンから作成しましょう。</div>
      <button class="btn btn-primary btn-block" id="btnCreateItemList">＋ アイテム作成</button>`;
  }
  const rows = appData.items.map(it=>{
    const todos = appData.todos.filter(t=>t.itemId===it.id);
    const doCount = todos.filter(t=>t.status==='DO').length;
    return `
      <div class="item-row">
        <div class="item-name" data-open-item="${it.id}" style="border-left:5px solid ${itemColor(it.id)};padding-left:10px;">
          ${escapeHtml(it.name)}
          <div class="item-sub">TO ${todos.length}件・DO ${doCount}件</div>
        </div>
        <button class="btn btn-danger btn-sm" data-delete-item="${it.id}">削除</button>
      </div>`;
  }).join('');

  return `
    <button class="btn btn-primary btn-block" id="btnCreateItemList" style="margin-bottom:16px;">＋ アイテム作成</button>
    ${rows}
  `;
}

/* ==========================================================
   カレンダー画面
   ========================================================== */
function renderCalendar(){
  const y = calendarViewDate.getFullYear();
  const m = calendarViewDate.getMonth();
  const firstDay = new Date(y, m, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const daysInPrevMonth = new Date(y, m, 0).getDate();

  let cells = [];
  for(let i=startWeekday-1;i>=0;i--){
    cells.push({ d: daysInPrevMonth-i, other:true, dateStr: null });
  }
  for(let d=1; d<=daysInMonth; d++){
    cells.push({ d, other:false, dateStr: `${y}-${pad(m+1)}-${pad(d)}` });
  }
  while(cells.length % 7 !== 0){
    const idx = cells.length - (startWeekday + daysInMonth);
    cells.push({ d: idx+1, other:true, dateStr:null });
  }

  const today = todayStr();
  const cellsHtml = cells.map(c=>{
    if(c.other){
      return `<div class="cal-cell other-month">${c.d}</div>`;
    }
    const todosOn = appData.todos.filter(t=>t.deadline===c.dateStr);
    let dot = '';
    if(todosOn.length>0){
      const allDone = todosOn.every(t=>t.status==='DO');
      dot = `<span class="cal-dot ${allDone?'all-done':''}"></span>`;
    }
    const classes = ['cal-cell'];
    if(c.dateStr===today) classes.push('today');
    if(c.dateStr===selectedCalDate) classes.push('selected');
    return `<div class="${classes.join(' ')}" data-cal-date="${c.dateStr}">${c.d}${dot}</div>`;
  }).join('');

  let dayListHtml = '';
  if(selectedCalDate){
    const todosOn = appData.todos
      .filter(t=>t.deadline===selectedCalDate)
      .sort((a,b)=> a.status===b.status?0:(a.status==='DO'?1:-1));
    dayListHtml = `
      <p class="cal-daylist-title">${formatDateJP(selectedCalDate)} の TO / DO</p>
      ${ todosOn.length===0
          ? `<div class="empty-state"><div class="glyph">—</div>この日のTOはありません</div>`
          : todosOn.map(t=>renderTodoCard(t, true)).join('') }
    `;
  }

  return `
    <div class="card">
      <div class="cal-nav">
        <button id="calPrev">‹</button>
        <span class="cal-title">${y}年 ${m+1}月</span>
        <button id="calNext">›</button>
      </div>
      <div class="cal-grid">
        ${WEEK_JP.map(w=>`<div class="cal-wd">${w}</div>`).join('')}
        ${cellsHtml}
      </div>
    </div>
    ${dayListHtml}
  `;
}

/* ==========================================================
   モーダル: アイテム作成
   ========================================================== */
function openItemModal(){
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <button class="modal-close-x" id="modalCloseX">✕</button>
    <div class="modal-handle"></div>
    <p class="modal-title">アイテム作成</p>
    <label class="field-label">アイテム名</label>
    <input type="text" id="newItemName" placeholder="例）英語学習、半導体投資 など" maxlength="40">
    <div class="btn-row">
      <button class="btn btn-outline" id="modalCancel">キャンセル</button>
      <button class="btn btn-primary" id="modalSaveItem">作成する</button>
    </div>
  `;
  overlay.classList.remove('hidden');
  document.getElementById('newItemName').focus();
  document.getElementById('modalCloseX').onclick = closeModal;
  document.getElementById('modalCancel').onclick = closeModal;
  document.getElementById('modalSaveItem').onclick = async ()=>{
    const name = document.getElementById('newItemName').value.trim();
    if(!name){ alert('アイテム名を入力してください'); return; }
    appData.items.push({ id: uid(), name, createdAt: Date.now() });
    await saveData();
    closeModal();
    render();
  };
}

/* ==========================================================
   モーダル: トップ画面タイトル編集
   ========================================================== */
function openTitleModal(){
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <button class="modal-close-x" id="modalCloseX">✕</button>
    <div class="modal-handle"></div>
    <p class="modal-title">タイトルを編集</p>
    <label class="field-label">TOP画面の見出し</label>
    <input type="text" id="editTitleInput" placeholder="例）台帳" maxlength="20" value="${escapeHtml(appData.settings.title)}">
    <div class="btn-row">
      <button class="btn btn-outline" id="modalCancel">キャンセル</button>
      <button class="btn btn-primary" id="modalSaveTitle">保存する</button>
    </div>
  `;
  overlay.classList.remove('hidden');
  const input = document.getElementById('editTitleInput');
  input.focus();
  input.select();
  document.getElementById('modalCloseX').onclick = closeModal;
  document.getElementById('modalCancel').onclick = closeModal;
  document.getElementById('modalSaveTitle').onclick = async ()=>{

    closeModal();

/* ==========================================================
   モーダル: TO作成・編集
   ========================================================== */
function openTodoModal(todoId){
  const isEdit = !!todoId;
  const todo = isEdit ? appData.todos.find(t=>t.id===todoId) : null;
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');

  const itemOptions = appData.items.map(it=>
    `<option value="${it.id}" ${ (todo?todo.itemId:selectedItemId)===it.id ? 'selected':''}>${escapeHtml(it.name)}</option>`
  ).join('');

  content.innerHTML = `
    <button class="modal-close-x" id="modalCloseX">✕</button>
    <div class="modal-handle"></div>
    <p class="modal-title">${isEdit ? 'TO / DO 編集' : 'TO作成'}</p>

    <label class="field-label">アイテム</label>
    <select id="todoItem">${itemOptions}</select>

    <label class="field-label">タイトル</label>
    <input type="text" id="todoTitle" placeholder="タスク名" maxlength="60" value="${todo?escapeHtml(todo.title):''}">

    <label class="field-label">期限</label>
    <input type="date" id="todoDeadline" value="${todo?todo.deadline||'':''}">

    <label class="field-label">URL（任意）</label>
    <input type="url" id="todoUrl" placeholder="https://..." value="${todo?escapeHtml(todo.url||''):''}">

    <label class="field-label">振り返りメモ（任意）</label>
    <textarea id="todoMemo" placeholder="気づき・反省点など">${todo?escapeHtml(todo.memo||''):''}</textarea>

    ${isEdit ? `
      <div class="btn-row">
        <button class="btn btn-to btn-sm" id="btnMarkTo" ${todo.status!=='DO'?'style="display:none;"':''}>TOに戻す</button>
        <button class="btn btn-do btn-sm" id="btnMarkDo" ${todo.status==='DO'?'style="display:none;"':''}>DOにする</button>
      </div>
    ` : ''}

    <div class="btn-row">
      ${isEdit ? `<button class="btn btn-danger" id="btnDeleteTodo">削除</button>` : ''}
      <button class="btn btn-primary" id="modalSaveTodo">${isEdit ? '保存する' : '作成する'}</button>
    </div>
  `;
  overlay.classList.remove('hidden');
  document.getElementById('modalCloseX').onclick = closeModal;

  if(isEdit){
    document.getElementById('btnMarkDo').onclick = async ()=>{
      todo.status = 'DO';
      await saveData();
      closeModal();
      render();
    };
    document.getElementById('btnMarkTo').onclick = async ()=>{
      todo.status = 'TO';
      await saveData();
      closeModal();
      render();
    };
    document.getElementById('btnDeleteTodo').onclick = async ()=>{
      if(!confirm('このTOを削除しますか？')) return;
      appData.todos = appData.todos.filter(t=>t.id!==todoId);
      await saveData();
      closeModal();
      render();
    };
  }

  document.getElementById('modalSaveTodo').onclick = async ()=>{
    const itemId = document.getElementById('todoItem').value;
    const title = document.getElementById('todoTitle').value.trim();
    const deadline = document.getElementById('todoDeadline').value;
    const url = document.getElementById('todoUrl').value.trim();
    const memo = document.getElementById('todoMemo').value.trim();
    if(!title){ alert('タイトルを入力してください'); return; }
    if(!deadline){ alert('期限を入力してください'); return; }

    if(isEdit){
      todo.itemId = itemId;
      todo.title = title;
      todo.deadline = deadline;
      todo.url = url;
      todo.memo = memo;
    }else{
      appData.todos.push({
        id: uid(), itemId, title, deadline, url, memo,
        status: 'TO', createdAt: Date.now()
      });
    }
    await saveData();
    closeModal();
    render();
  };
}

function closeModal(){
  document.getElementById('modalOverlay').classList.add('hidden');
}

/* ==========================================================
   イベント割り当て
   ========================================================== */
function attachScreenEvents(){
  const screen = document.getElementById('screen');

  screen.querySelectorAll('[data-open-todo]').forEach(el=>{
    el.addEventListener('click', ()=> openTodoModal(el.dataset.openTodo));
  });

  const btnCreateItemTop = document.getElementById('btnCreateItemTop');
  if(btnCreateItemTop) btnCreateItemTop.addEventListener('click', openItemModal);

  const btnCreateItemList = document.getElementById('btnCreateItemList');
  if(btnCreateItemList) btnCreateItemList.addEventListener('click', openItemModal);

  const btnGoItems = document.getElementById('btnGoItems');
  if(btnGoItems) btnGoItems.addEventListener('click', ()=> switchTab('items'));

  const itemSelect = document.getElementById('itemSelect');
  if(itemSelect) itemSelect.addEventListener('change', (e)=>{
    selectedItemId = e.target.value;
    render();
  });

  const btnCreateTodo = document.getElementById('btnCreateTodo');
  if(btnCreateTodo) btnCreateTodo.addEventListener('click', ()=> openTodoModal(null));

  screen.querySelectorAll('[data-open-item]').forEach(el=>{
    el.addEventListener('click', ()=>{
      selectedItemId = el.dataset.openItem;
      switchTab('schedule');
    });
  });

  screen.querySelectorAll('[data-delete-item]').forEach(el=>{
    el.addEventListener('click', async (e)=>{
      e.stopPropagation();
      const id = el.dataset.deleteItem;
      if(!confirm('このアイテムと、紐づくすべてのTO/DOを削除しますか？')) return;
      appData.items = appData.items.filter(i=>i.id!==id);
      appData.todos = appData.todos.filter(t=>t.itemId!==id);
      if(selectedItemId===id) selectedItemId = null;
      await saveData();
      render();
    });
  });

  const calPrev = document.getElementById('calPrev');
  if(calPrev) calPrev.addEventListener('click', ()=>{
    calendarViewDate = new Date(calendarViewDate.getFullYear(), calendarViewDate.getMonth()-1, 1);
    render();
  });
  const calNext = document.getElementById('calNext');
  if(calNext) calNext.addEventListener('click', ()=>{
    calendarViewDate = new Date(calendarViewDate.getFullYear(), calendarViewDate.getMonth()+1, 1);
    render();
  });
  screen.querySelectorAll('[data-cal-date]').forEach(el=>{
    el.addEventListener('click', ()=>{
      selectedCalDate = el.dataset.calDate;
      render();
    });
  });
}

/* ==========================================================
   起動
   ========================================================== */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=> switchTab(btn.dataset.tab));
});
document.getElementById('titleEditBtn').addEventListener('click', openTitleModal);

(async function init(){
  await loadData();
  if(!storageAvailable) showStorageWarning();
  switchTab('top');
})();
</script>
