<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>台帳 — タスク管理</title>
<meta name="description" content="アイテム・TO・DOを一元管理する個人用タスク管理アプリ">
<meta name="theme-color" content="#203B4C">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="台帳">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F1E9;
    --paper:#FFFFFF;
    --ink:#26262B;
    --ink-soft:#726F66;
    --ink-faint:#A6A296;
    --line:#E1DCCC;
    --line-strong:#CBC4AE;
    --accent:#33566F;
    --accent-soft:#E3EBEE;
    --accent-deep:#203B4C;
    --do:#4C8C6B;
    --do-bg:#DEEEE3;
    --due:#D69A2D;
    --due-bg:#FAEBCB;
    --gray:#C9C6BE;
    --gray-bg:#ECEAE2;
    --danger:#B8503F;
    --danger-bg:#F5E1DC;
    --review:#6B5B95;
    --review-bg:#E9E4F3;
    --radius:16px;
    --radius-sm:10px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:#DCD6C4;
    font-family:'Noto Sans JP','Zen Kaku Gothic New',sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  .phone{
    width:100%;
    max-width:430px;
    min-height:100vh;
    background:var(--bg);
    position:relative;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 40px rgba(0,0,0,0.25);
    background-image:
      linear-gradient(var(--bg),var(--bg)),
      repeating-linear-gradient(0deg, rgba(51,86,111,0.035) 0px, rgba(51,86,111,0.035) 1px, transparent 1px, transparent 28px),
      repeating-linear-gradient(90deg, rgba(51,86,111,0.035) 0px, rgba(51,86,111,0.035) 1px, transparent 1px, transparent 28px);
  }
  .topbar{
    padding:22px 20px 16px;
    position:sticky;
    top:0;
    z-index:5;
    background:linear-gradient(180deg, var(--bg) 80%, rgba(244,241,233,0));
  }
  .topbar .eyebrow{
    font-family:'Zen Kaku Gothic New',sans-serif;
    font-size:11px;
    letter-spacing:.18em;
    color:var(--ink-faint);
    text-transform:uppercase;
    margin:0 0 2px;
  }
  .topbar h1{
    font-family:'Zen Maru Gothic',sans-serif;
    font-weight:900;
    font-size:23px;
    margin:0;
    color:var(--accent-deep);
    letter-spacing:.02em;
  }
  .title-row{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .title-edit-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    width:26px;height:26px;
    border-radius:8px;
    border:none;
    background:var(--accent-soft);
    color:var(--accent);
    cursor:pointer;
    flex-shrink:0;
  }
  .title-edit-btn svg{width:14px;height:14px;}
  .title-edit-btn.hidden{display:none;}
  .storage-warning{
    background:var(--due-bg);
    color:#7A5416;
    font-size:11.5px;
    font-weight:700;
    line-height:1.5;
    text-align:center;
    padding:9px 16px;
    border-bottom:1px solid var(--due);
  }
  .storage-warning.hidden{display:none;}
  .screen{
    flex:1;
    padding:0 20px 110px;
    overflow-y:auto;
  }
  .screen::-webkit-scrollbar{display:none;}

  /* ---- card / section basics ---- */
  .card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:16px;
  }
  .section-title{
    font-family:'Zen Maru Gothic',sans-serif;
    font-weight:700;
    font-size:13px;
    color:var(--accent);
    letter-spacing:.06em;
    margin:0 0 10px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .section-title .num{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:18px;height:18px;
    border-radius:5px;
    background:var(--accent);
    color:#fff;
    font-size:10px;
    font-weight:700;
  }

  /* ---- buttons ---- */
  .btn{
    font-family:'Zen Kaku Gothic New',sans-serif;
    font-weight:700;
    font-size:14px;
    border:none;
    border-radius:12px;
    padding:13px 18px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    transition:transform .08s ease, opacity .15s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--accent);color:#fff;width:100%;}
  .btn-outline{background:var(--paper);color:var(--accent);border:1.5px solid var(--accent);}
  .btn-danger{background:var(--danger-bg);color:var(--danger);}
  .btn-do{background:var(--do-bg);color:var(--do);}
  .btn-to{background:var(--gray-bg);color:var(--ink-soft);}
  .btn-sm{padding:9px 12px;font-size:12.5px;border-radius:9px;}
  .btn-block{width:100%;}
  .btn-row{display:flex;gap:8px;margin-top:14px;}
  .btn-row .btn{flex:1;}

  /* ---- today panel ---- */
  .today-date{
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:15px;
    font-weight:700;
    color:var(--ink);
    margin-bottom:10px;
  }
  .today-empty{
    color:var(--ink-faint);
    font-size:13px;
    padding:6px 2px;
  }

  /* ---- TO card (ledger tab style) ---- */
  .to-item{
    position:relative;
    display:flex;
    align-items:center;
    gap:12px;
    background:var(--paper);
    border:1px solid var(--line);
    border-left:6px solid var(--gray);
    border-radius:var(--radius-sm);
    padding:12px 14px 12px 12px;
    margin-bottom:10px;
    cursor:pointer;
  }
  .to-item.status-do{border-left-color:var(--do); background:var(--do-bg);}
  .to-item.status-due{border-left-color:var(--due); background:var(--due-bg);}
  .to-item.status-review{border-left-color:var(--review); background:var(--review-bg);}
  .to-item .to-main{flex:1; min-width:0;}
  .to-item .to-title{
    font-weight:700;
    font-size:14.5px;
    color:var(--ink);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .to-item .to-meta{
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:3px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
  }
  .to-item .to-link{
    color:var(--accent);
    font-weight:700;
    text-decoration:none;
    white-space:nowrap;
  }
  .to-item .to-link:active{opacity:.6;}
  .to-item .to-badge{
    font-size:10px;
    font-weight:700;
    padding:2px 7px;
    border-radius:20px;
    background:var(--accent-soft);
    color:var(--accent);
    white-space:nowrap;
  }
  .to-item.status-do .to-badge{background:var(--do);color:#fff;}
  .to-item.status-due .to-badge{background:var(--due);color:#fff;}
  .to-item.status-review .to-badge{background:var(--review);color:#fff;}
  .modal-url-link{
    display:inline-block;
    margin-top:8px;
    font-size:12.5px;
    font-weight:700;
    color:var(--accent);
    text-decoration:none;
    word-break:break-all;
  }
  .item-reminder-tag{
    display:inline-block;
    font-size:10px;
    font-weight:700;
    color:var(--review);
    background:var(--review-bg);
    border-radius:20px;
    padding:2px 8px;
    margin-left:6px;
  }
  .checkbox-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:14px;
    font-size:13px;
    font-weight:700;
    color:var(--ink);
  }
  .checkbox-row input[type=checkbox]{
    width:18px;height:18px;
    accent-color:var(--accent);
  }
  .checkbox-hint{
    font-size:11px;
    color:var(--ink-soft);
    font-weight:400;
    margin-top:4px;
  }

  /* ---- dropdown ---- */
  select, input[type=text], input[type=date], input[type=url], textarea{
    width:100%;
    font-family:'Noto Sans JP',sans-serif;
    font-size:14.5px;
    padding:11px 12px;
    border-radius:10px;
    border:1.5px solid var(--line-strong);
    background:var(--paper);
    color:var(--ink);
    outline:none;
  }
  select:focus, input:focus, textarea:focus{border-color:var(--accent);}
  label.field-label{
    display:block;
    font-size:12px;
    font-weight:700;
    color:var(--ink-soft);
    margin:14px 0 6px;
  }
  label.field-label:first-child{margin-top:0;}
  textarea{resize:vertical;min-height:70px;}

  /* ---- item chip (item list) ---- */
  .item-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    padding:14px;
    margin-bottom:10px;
  }
  .item-row .item-name{
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    flex:1;
  }
  .item-row .item-sub{
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:2px;
  }

  /* ---- empty state ---- */
  .empty-state{
    text-align:center;
    padding:34px 14px;
    color:var(--ink-faint);
    font-size:13px;
  }
  .empty-state .glyph{font-size:26px;margin-bottom:8px;}

  /* ---- bar chart ---- */
  .bar-row{margin-bottom:12px;}
  .bar-row .bar-label{
    display:flex;
    justify-content:space-between;
    font-size:12.5px;
    font-weight:700;
    margin-bottom:5px;
  }
  .bar-row .bar-label .cnt{color:var(--ink-soft);font-weight:500;font-size:11.5px;}
  .bar-track{
    display:flex;
    height:14px;
    border-radius:8px;
    overflow:hidden;
    background:var(--gray-bg);
    width:100%;
  }
  .bar-do{background:var(--do);}
  .bar-to{background:var(--gray);}

  /* ---- legend ---- */
  .legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:12px;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-soft);}
  .legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

  /* ---- chart filter chips ---- */
  .chart-filter-row{display:flex;flex-wrap:wrap;gap:8px;}
  .chart-filter-chip{
    font-family:'Noto Sans JP',sans-serif;
    font-size:12.5px;
    font-weight:700;
    padding:7px 12px;
    border-radius:20px;
    border:1.5px solid var(--line-strong);
    cursor:pointer;
    white-space:nowrap;
    transition:opacity .1s ease;
  }
  .chart-filter-chip:active{opacity:.7;}
  .chart-filter-actions{
    display:flex;
    gap:14px;
    margin-top:12px;
  }
  .chart-filter-link{
    background:none;
    border:none;
    font-size:11.5px;
    font-weight:700;
    color:var(--accent);
    text-decoration:underline;
    cursor:pointer;
    padding:0;
  }

  /* ---- calendar ---- */
  .cal-nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .cal-nav .cal-title{
    font-family:'Zen Maru Gothic',sans-serif;
    font-weight:700;
    font-size:16px;
    color:var(--accent-deep);
  }
  .cal-nav button{
    background:var(--accent-soft);
    color:var(--accent);
    border:none;
    width:32px;height:32px;
    border-radius:9px;
    font-size:16px;
    cursor:pointer;
  }
  .cal-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:4px;
  }
  .cal-wd{
    text-align:center;
    font-size:11px;
    color:var(--ink-faint);
    font-weight:700;
    padding-bottom:4px;
  }
  .cal-cell{
    aspect-ratio:1/1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    font-size:12.5px;
    cursor:pointer;
    color:var(--ink);
    position:relative;
    background:transparent;
  }
  .cal-cell.other-month{color:var(--ink-faint);opacity:.4;}
  .cal-cell.today{border:1.5px solid var(--accent);font-weight:700;}
  .cal-cell.selected{background:var(--accent);color:#fff;}
  .cal-dot{
    width:6px;height:6px;
    border-radius:50%;
    margin-top:3px;
    background:var(--gray);
  }
  .cal-dot.all-done{background:var(--do);}
  .cal-cell.selected .cal-dot{background:#fff;}

  .cal-daylist-title{
    font-size:13px;
    font-weight:700;
    color:var(--accent);
    margin:20px 0 10px;
  }

  /* ---- pie chart ---- */
  .pie-wrap{display:flex;align-items:center;gap:18px;}
  .pie-wrap svg{flex-shrink:0;}

  /* ---- tabbar ---- */
  .tabbar{
    position:fixed;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    max-width:430px;
    display:flex;
    background:rgba(255,255,255,0.92);
    backdrop-filter:blur(10px);
    border-top:1px solid var(--line);
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    z-index:20;
  }
  .tab-btn{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
    background:none;
    border:none;
    padding:6px 2px;
    cursor:pointer;
    color:var(--ink-faint);
    font-size:10.5px;
    font-family:'Zen Kaku Gothic New',sans-serif;
    font-weight:700;
  }
  .tab-btn.active{color:var(--accent);}
  .tab-btn svg{width:22px;height:22px;}

  /* ---- modal ---- */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(38,38,43,0.45);
    display:flex;
    align-items:flex-end;
    justify-content:center;
    z-index:50;
    opacity:1;
    transition:opacity .15s ease;
  }
  .modal-overlay.hidden{display:none;}
  .modal-content{
    width:100%;
    max-width:430px;
    background:var(--bg);
    border-radius:22px 22px 0 0;
    padding:20px 20px calc(24px + env(safe-area-inset-bottom));
    max-height:88vh;
    overflow-y:auto;
    animation:slideUp .2s ease;
  }
  @keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .modal-handle{
    width:38px;height:4px;
    background:var(--line-strong);
    border-radius:3px;
    margin:0 auto 14px;
  }
  .modal-title{
    font-family:'Zen Maru Gothic',sans-serif;
    font-weight:700;
    font-size:17px;
    color:var(--accent-deep);
    margin-bottom:4px;
  }
  .modal-close-x{
    position:absolute;
    top:16px; right:18px;
    background:none;border:none;
    font-size:18px;
    color:var(--ink-faint);
    cursor:pointer;
  }
  .field-hint{font-size:11px;color:var(--ink-faint);margin-top:4px;}
</style>
</head>
<body>
<div class="phone">
  <div class="storage-warning hidden" id="storageWarning">
    ⚠️ この開き方だとデータが保存されません。Safariで直接開き「ホーム画面に追加」してからご利用ください。
  </div>
  <div class="topbar">
    <p class="eyebrow" id="topbarEyebrow">LEDGER</p>
    <div class="title-row">
      <h1 id="topbarTitle">台帳</h1>
      <button class="title-edit-btn hidden" id="titleEditBtn" aria-label="タイトルを編集">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
      </button>
    </div>
  </div>
  <div class="screen" id="screen"></div>

  <nav class="tabbar">
    <button class="tab-btn" data-tab="top">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      TOP
    </button>
    <button class="tab-btn" data-tab="schedule">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6h11M9 12h11M9 18h11"/><circle cx="4" cy="6" r="1.6"/><circle cx="4" cy="12" r="1.6"/><circle cx="4" cy="18" r="1.6"/></svg>
      進捗管理
    </button>
    <button class="tab-btn" data-tab="items">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l3-3h5l1 2h9v3H3z"/><path d="M3 7v11a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V9"/></svg>
      アイテム
    </button>
    <button class="tab-btn" data-tab="calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
      カレンダー
    </button>
  </nav>
</div>

<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
/* ==========================================================
   データ層
   ========================================================== */
let appData = { items: [], todos: [], settings: { title: '台帳', hiddenChartItemIds: [] } };
let currentTab = 'top';
let selectedItemId = null;      // 進捗管理タブで選択中のアイテム
let calendarViewDate = new Date();
let selectedCalDate = null;

const STORAGE_KEY = 'ledger-app-data';
const ITEM_COLORS = ['#33566F','#4C8C6B','#D69A2D','#B8503F','#7C5AA0','#3A8CA0','#B8763A','#5A7A35','#8C5C7C','#4A7A9E'];

function uid(){ return 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,8); }
function pad(n){ return String(n).padStart(2,'0'); }
function dateToStr(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function todayStr(){ return dateToStr(new Date()); }
const WEEK_JP = ['日','月','火','水','木','金','土'];
function formatDateJP(dateStr){
  if(!dateStr) return '期限未設定';
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(y,m-1,d);
  return `${y}年${m}月${d}日(${WEEK_JP[dt.getDay()]})`;
}
function formatDateShort(dateStr){
  if(!dateStr) return '—';
  const [y,m,d] = dateStr.split('-').map(Number);
  return `${m}/${d}`;
}
function itemColor(itemId){
  const idx = appData.items.findIndex(i=>i.id===itemId);
  return ITEM_COLORS[idx>=0 ? idx % ITEM_COLORS.length : 0];
}
function itemName(itemId){
  const it = appData.items.find(i=>i.id===itemId);
  return it ? it.name : '(削除済みアイテム)';
}
function getItem(itemId){
  return appData.items.find(i=>i.id===itemId) || null;
}
function isItemVisibleInCharts(itemId){
  return !appData.settings.hiddenChartItemIds.includes(itemId);
}
async function toggleChartItemVisibility(itemId){
  const list = appData.settings.hiddenChartItemIds;
  const idx = list.indexOf(itemId);
  if(idx>=0) list.splice(idx,1);
  else list.push(itemId);
  await saveData();
  render();
}
function addDaysToDateStr(dateStr, days){
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate() + days);
  return dateToStr(dt);
}
function addMonthsClamped(dateStr, months){
  const [y,m,d] = dateStr.split('-').map(Number);
  const totalMonthIndex = (m-1) + months;
  const targetYear = y + Math.floor(totalMonthIndex/12);
  const targetMonth0 = ((totalMonthIndex%12)+12)%12;
  const daysInTargetMonth = new Date(targetYear, targetMonth0+1, 0).getDate();
  const targetDay = Math.min(d, daysInTargetMonth);
  return dateToStr(new Date(targetYear, targetMonth0, targetDay));
}
function addYearsClamped(dateStr, years){
  const [y,m,d] = dateStr.split('-').map(Number);
  const targetYear = y + years;
  const daysInTargetMonth = new Date(targetYear, m, 0).getDate();
  const targetDay = Math.min(d, daysInTargetMonth);
  return dateToStr(new Date(targetYear, m-1, targetDay));
}
function nthWeekdayOfMonth(year, month0, weekOfMonth, weekday){
  const first = new Date(year, month0, 1);
  const firstWeekday = first.getDay();
  const offset = (weekday - firstWeekday + 7) % 7;
  const firstMatchDay = 1 + offset;
  const daysInMonth = new Date(year, month0+1, 0).getDate();
  if(weekOfMonth === 'last'){
    let day = firstMatchDay;
    while(day + 7 <= daysInMonth) day += 7;
    return dateToStr(new Date(year, month0, day));
  }
  let day = firstMatchDay + (weekOfMonth-1)*7;
  if(day > daysInMonth){
    // その週目が存在しない月は最終週にフォールバック
    day = firstMatchDay;
    while(day + 7 <= daysInMonth) day += 7;
  }
  return dateToStr(new Date(year, month0, day));
}
function deriveMonthWeekdayPattern(dateStr){
  const [y,m,d] = dateStr.split('-').map(Number);
  const weekday = new Date(y, m-1, d).getDay();
  const daysInMonth = new Date(y, m, 0).getDate();
  const isLast = (d + 7 > daysInMonth);
  const weekOfMonth = isLast ? 'last' : Math.ceil(d/7);
  return { weekOfMonth, weekday };
}
function alignToWeekday(dateStr, weekday){
  let cur = dateStr;
  for(let i=0;i<7;i++){
    const [y,m,d] = cur.split('-').map(Number);
    if(new Date(y,m-1,d).getDay() === weekday) return cur;
    cur = addDaysToDateStr(cur, 1);
  }
  return dateStr;
}
function computeOccurrenceDeadline(rule, n){
  if(rule.unit === 'day') return addDaysToDateStr(rule.startDate, n*rule.interval);
  if(rule.unit === 'week') return addDaysToDateStr(rule.startDate, n*rule.interval*7);
  if(rule.unit === 'year') return addYearsClamped(rule.startDate, n*rule.interval);
  if(rule.unit === 'month'){
    if(rule.monthMode === 'weekday'){
      const [y0,m0] = rule.startDate.split('-').map(Number);
      const totalMonthIndex = (m0-1) + n*rule.interval;
      const targetYear = y0 + Math.floor(totalMonthIndex/12);
      const targetMonth0 = ((totalMonthIndex%12)+12)%12;
      return nthWeekdayOfMonth(targetYear, targetMonth0, rule.monthWeekOfMonth, rule.monthWeekday);
    }
    return addMonthsClamped(rule.startDate, n*rule.interval);
  }
  return rule.startDate;
}
function describeRecurrence(rule){
  if(!rule) return '';
  const wd = (n)=>WEEK_JP[n]+'曜日';
  if(rule.unit==='day') return rule.interval===1 ? '毎日' : `${rule.interval}日ごと`;
  if(rule.unit==='week') return rule.interval===1 ? `毎週${wd(rule.weekday)}` : `${rule.interval}週間ごと（${wd(rule.weekday)}）`;
  if(rule.unit==='year') return rule.interval===1 ? '毎年' : `${rule.interval}年ごと`;
  if(rule.unit==='month'){
    if(rule.monthMode==='weekday'){
      const wom = rule.monthWeekOfMonth==='last' ? '最終' : `第${rule.monthWeekOfMonth}`;
      return rule.interval===1 ? `毎月${wom}${wd(rule.monthWeekday)}` : `${rule.interval}か月ごと（${wom}${wd(rule.monthWeekday)}）`;
    }
    return rule.interval===1 ? '毎月同じ日' : `${rule.interval}か月ごと`;
  }
  return '';
}
const RECUR_HORIZON_DAYS = { day:60, week:182, month:365, year:365*5 };
function ensureSeriesGenerated(seriesId){
  const existing = appData.todos.filter(t=>t.recurrence && t.recurrence.seriesId===seriesId);
  if(existing.length===0) return;
  const rule = existing[0].recurrence;
  const template = existing[0];
  const horizonDays = RECUR_HORIZON_DAYS[rule.unit] || 180;
  const horizonDateStr = addDaysToDateStr(todayStr(), horizonDays);
  let n = existing.length;
  let safety = 0;
  while(safety < 200){
    const deadline = computeOccurrenceDeadline(rule, n);
    if(deadline > horizonDateStr) break;
    appData.todos.push({
      id: uid(),
      itemId: template.itemId,
      title: template.title,
      deadline,
      url: template.url,
      memo: '',
      status: 'TO',
      doneAt: null,
      createdAt: Date.now(),
      recurrence: rule
    });
    n++;
    safety++;
  }
}
function ensureAllSeriesGenerated(){
  const seriesIds = new Set(appData.todos.filter(t=>t.recurrence).map(t=>t.recurrence.seriesId));
  seriesIds.forEach(id=>ensureSeriesGenerated(id));
}
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let storageAvailable = true;

async function loadData(){
  try{
    const raw = window.localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      appData.items = parsed.items || [];
      appData.todos = parsed.todos || [];
      appData.settings = Object.assign({ title: '台帳', hiddenChartItemIds: [] }, parsed.settings || {});
    }
  }catch(e){
    // このブラウザ／表示方法では保存機能が使えない
    storageAvailable = false;
    console.error('保存データの読み込みに失敗しました', e);
  }
  migrateData();
  ensureAllSeriesGenerated();
  await saveData();
}
function migrateData(){
  // 既存アイテムに復習リマインド設定を追加（既存データは維持）
  appData.items.forEach(it=>{
    if(typeof it.reviewReminder !== 'boolean') it.reviewReminder = false;
  });
  // 既存のDO済みTOにdoneAt(完了日)を補完（既存データは維持）
  appData.todos.forEach(t=>{
    if(t.status==='DO' && !t.doneAt){
      t.doneAt = t.createdAt ? dateToStr(new Date(t.createdAt)) : todayStr();
    }
    if(typeof t.recurrence === 'undefined'){
      t.recurrence = null;
    }
  });
  if(!Array.isArray(appData.settings.hiddenChartItemIds)){
    appData.settings.hiddenChartItemIds = [];
  }
}
async function saveData(){
  try{
    window.localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
  }catch(e){
    storageAvailable = false;
    console.error('保存に失敗しました', e);
    showStorageWarning();
  }
}
function showStorageWarning(){
  const el = document.getElementById('storageWarning');
  if(el) el.classList.remove('hidden');
}

/* ==========================================================
   TO のステータス判定
   ========================================================== */
function isReviewDue(todo){
  if(todo.status !== 'DO' || !todo.doneAt) return false;
  const item = getItem(todo.itemId);
  if(!item || !item.reviewReminder) return false;
  const reviewDate = addDaysToDateStr(todo.doneAt, 2); // 学んだ日を1日目として3日目
  return todayStr() >= reviewDate;
}
function todoDisplayStatus(todo){
  if(todo.status === 'DO'){
    return isReviewDue(todo) ? 'REVIEW' : 'DO';
  }
  if(todo.deadline === todayStr()) return 'DUE';
  return 'TO';
}
function todoStatusClass(todo){
  const s = todoDisplayStatus(todo);
  if(s==='REVIEW') return 'status-review';
  if(s==='DO') return 'status-do';
  if(s==='DUE') return 'status-due';
  return '';
}
function todoBadgeText(todo){
  const s = todoDisplayStatus(todo);
  if(s==='REVIEW') return '復習';
  if(s==='DO') return '完了';
  if(s==='DUE') return '本日期限';
  return '未完了';
}

/* ==========================================================
   TOP 画面
   ========================================================== */
function renderTop(){
  const today = todayStr();
  const todayTodos = appData.todos
    .filter(t=>t.deadline===today)
    .sort((a,b)=> a.status===b.status ? 0 : (a.status==='DO'?1:-1));

  let todayHtml = '';
  if(todayTodos.length===0){
    todayHtml = `<p class="today-empty">本日期限のTOはありません。</p>`;
  }else{
    todayHtml = todayTodos.map(t=>renderTodoCard(t)).join('');
  }

  // 完了(DO)数を集計（表示アイテムでフィルター）
  const visibleItems = appData.items.filter(it=>isItemVisibleInCharts(it.id));
  const itemStats = visibleItems.map(it=>{
    const todos = appData.todos.filter(t=>t.itemId===it.id);
    const doCount = todos.filter(t=>t.status==='DO').length;
    const toCount = todos.filter(t=>t.status!=='DO').length;
    return { item: it, doCount, toCount, total: doCount+toCount };
  });

  // フィルターチップ（両グラフ共通）
  let filterHtml = '';
  if(appData.items.length===0){
    filterHtml = `<p class="today-empty">アイテムを作成すると、ここで表示・非表示を選べます。</p>`;
  }else{
    const chips = appData.items.map(it=>{
      const hidden = !isItemVisibleInCharts(it.id);
      const color = itemColor(it.id);
      const style = hidden
        ? `border-color:var(--line-strong);color:var(--ink-faint);background:transparent;`
        : `border-color:${color};color:${color};background:${color}1A;`;
      return `<button class="chart-filter-chip" data-toggle-chart-item="${it.id}" style="${style}">${hidden?'☐':'☑'} ${escapeHtml(it.name)}</button>`;
    }).join('');
    filterHtml = `
      <div class="chart-filter-row">${chips}</div>
      <div class="chart-filter-actions">
        <button class="chart-filter-link" id="btnShowAllCharts">すべて表示</button>
        <button class="chart-filter-link" id="btnHideAllCharts">すべて非表示</button>
      </div>`;
  }

  const pieData = itemStats.filter(s=>s.doCount>0);
  const pieTotal = pieData.reduce((sum,s)=>sum+s.doCount,0);

  let pieSvg;
  if(appData.items.length>0 && visibleItems.length===0){
    pieSvg = `<div class="empty-state"><div class="glyph">◌</div>表示するアイテムが選ばれていません</div>`;
  }else if(pieTotal===0){
    pieSvg = `<div class="empty-state"><div class="glyph">◌</div>完了したタスクがまだありません</div>`;
  }else{
    const r=62, cx=76, cy=76, sw=26;
    const circumference = 2*Math.PI*r;
    let offsetAcc = 0;
    let circles = '';
    pieData.forEach(s=>{
      const frac = s.doCount/pieTotal;
      const dash = frac*circumference;
      circles += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${itemColor(s.item.id)}" stroke-width="${sw}"
        stroke-dasharray="${dash} ${circumference-dash}" stroke-dashoffset="${-offsetAcc}"
        transform="rotate(-90 ${cx} ${cy})" stroke-linecap="butt"/>`;
      offsetAcc += dash;
    });
    const legend = pieData.map(s=>`
      <div class="legend-item">
        <span class="legend-dot" style="background:${itemColor(s.item.id)}"></span>
        ${escapeHtml(s.item.name)} (${s.doCount})
      </div>`).join('');
    pieSvg = `
      <div class="pie-wrap">
        <svg width="152" height="152" viewBox="0 0 152 152">${circles}
          <text x="76" y="72" text-anchor="middle" font-size="20" font-weight="700" fill="var(--ink)">${pieTotal}</text>
          <text x="76" y="90" text-anchor="middle" font-size="10" fill="var(--ink-soft)">完了タスク</text>
        </svg>
        <div class="legend" style="flex-direction:column;margin-top:0;">${legend}</div>
      </div>`;
  }

  // 横棒グラフ（DO数の多い順）
  const barData = [...itemStats].filter(s=>s.total>0).sort((a,b)=> b.doCount-a.doCount);
  const maxTotal = Math.max(1, ...barData.map(s=>s.total));
  let barsHtml;
  if(appData.items.length>0 && visibleItems.length===0){
    barsHtml = `<div class="empty-state"><div class="glyph">▭</div>表示するアイテムが選ばれていません</div>`;
  }else if(barData.length===0){
    barsHtml = `<div class="empty-state"><div class="glyph">▭</div>アイテムを作成してTOを登録しましょう</div>`;
  }else{
    barsHtml = barData.map(s=>{
      const doPct = (s.doCount/maxTotal*100).toFixed(1);
      const toPct = (s.toCount/maxTotal*100).toFixed(1);
      return `
      <div class="bar-row">
        <div class="bar-label">
          <span>${escapeHtml(s.item.name)}</span>
          <span class="cnt">DO ${s.doCount} / TO ${s.toCount}</span>
        </div>
        <div class="bar-track">
          <div class="bar-do" style="width:${doPct}%"></div>
          <div class="bar-to" style="width:${toPct}%"></div>
        </div>
      </div>`;
    }).join('');
  }

  return `
    <div class="card">
      <p class="section-title"><span class="num">1</span>${formatDateJP(today)}・本日期限のTO</p>
      ${todayHtml}
    </div>

    <button class="btn btn-primary btn-block" id="btnCreateItemTop">＋ アイテム作成</button>

    <div class="card" style="margin-top:16px;">
      <p class="section-title"><span class="num">2</span>表示するアイテムを選択</p>
      ${filterHtml}
    </div>

    <div class="card">
      <p class="section-title"><span class="num">3</span>完了タスクの内訳</p>
      ${pieSvg}
    </div>

    <div class="card">
      <p class="section-title"><span class="num">4</span>アイテム別 進捗（DO多い順）</p>
      ${barsHtml}
    </div>
  `;
}

/* ==========================================================
   カレンダー画面
   ========================================================== */
function renderCalendar(){
  const y = calendarViewDate.getFullYear();
  const m = calendarViewDate.getMonth();
  const firstDay = new Date(y, m, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const daysInPrevMonth = new Date(y, m, 0).getDate();

  let cells = [];
  for(let i=startWeekday-1;i>=0;i--){
    cells.push({ d: daysInPrevMonth-i, other:true, dateStr: null });
  }
  for(let d=1; d<=daysInMonth; d++){
    cells.push({ d, other:false, dateStr: `${y}-${pad(m+1)}-${pad(d)}` });
  }
  while(cells.length % 7 !== 0){
    const idx = cells.length - (startWeekday + daysInMonth);
    cells.push({ d: idx+1, other:true, dateStr:null });
  }

  const today = todayStr();
  const cellsHtml = cells.map(c=>{
    if(c.other){
      return `<div class="cal-cell other-month">${c.d}</div>`;
    }
    const todosOn = appData.todos.filter(t=>t.deadline===c.dateStr);
    let dot = '';
    if(todosOn.length>0){
      const allDone = todosOn.every(t=>t.status==='DO');
      dot = `<span class="cal-dot ${allDone?'all-done':''}"></span>`;
    }
    const classes = ['cal-cell'];
    if(c.dateStr===today) classes.push('today');
    if(c.dateStr===selectedCalDate) classes.push('selected');
    return `<div class="${classes.join(' ')}" data-cal-date="${c.dateStr}">${c.d}${dot}</div>`;
  }).join('');

  let dayListHtml = '';
  if(selectedCalDate){
    const todosOn = appData.todos
      .filter(t=>t.deadline===selectedCalDate)
      .sort((a,b)=> a.status===b.status?0:(a.status==='DO'?1:-1));
    dayListHtml = `
      <p class="cal-daylist-title">${formatDateJP(selectedCalDate)} の TO / DO</p>
      ${ todosOn.length===0
          ? `<div class="empty-state"><div class="glyph">—</div>この日のTOはありません</div>`
          : todosOn.map(t=>renderTodoCard(t, true)).join('') }
    `;
  }

  return `
    <div class="card">
      <div class="cal-nav">
        <button id="calPrev">‹</button>
        <span class="cal-title">${y}年 ${m+1}月</span>
        <button id="calNext">›</button>
      </div>
      <div class="cal-grid">
        ${WEEK_JP.map(w=>`<div class="cal-wd">${w}</div>`).join('')}
        ${cellsHtml}
      </div>
    </div>
    ${dayListHtml}
  `;
}

function openTitleModal(){
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <button class="modal-close-x" id="modalCloseX">✕</button>
    <div class="modal-handle"></div>
    <p class="modal-title">タイトルを編集</p>
    <label class="field-label">TOP画面の見出し</label>
    <input type="text" id="editTitleInput" placeholder="例）台帳" maxlength="20" value="${escapeHtml(appData.settings.title)}">
    <div class="btn-row">
      <button class="btn btn-outline" id="modalCancel">キャンセル</button>
      <button class="btn btn-primary" id="modalSaveTitle">保存する</button>
    </div>
  `;
  overlay.classList.remove('hidden');
  const input = document.getElementById('editTitleInput');
  input.focus();
  input.select();
  document.getElementById('modalCloseX').onclick = closeModal;
  document.getElementById('modalCancel').onclick = closeModal;
  document.getElementById('modalSaveTitle').onclick = async ()=>{
    const val = input.value.trim();
    appData.settings.title = val || '台帳';
    await saveData();
    closeModal();
    document.getElementById('topbarTitle').textContent = appData.settings.title;
  };
}

/* ==========================================================
   モーダル: TO作成・編集
   ========================================================== */
function openTodoModal(todoId){
  const isEdit = !!todoId;
  const todo = isEdit ? appData.todos.find(t=>t.id===todoId) : null;
  const displayStatus = todo ? todoDisplayStatus(todo) : null;
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');

  const itemOptions = appData.items.map(it=>
    `<option value="${it.id}" ${ (todo?todo.itemId:selectedItemId)===it.id ? 'selected':''}>${escapeHtml(it.name)}</option>`
  ).join('');

  const weekdayOptions = WEEK_JP.map((w,i)=>`<option value="${i}">${w}曜日</option>`).join('');

  content.innerHTML = `
    <button class="modal-close-x" id="modalCloseX">✕</button>
    <div class="modal-handle"></div>
    <p class="modal-title">${isEdit ? 'TO / DO 編集' : 'TO作成'}</p>

    <label class="field-label">アイテム</label>
    <select id="todoItem">${itemOptions}</select>

    <label class="field-label">タイトル</label>
    <input type="text" id="todoTitle" placeholder="タスク名" maxlength="60" value="${todo?escapeHtml(todo.title):''}">

    <label class="field-label">期限</label>
    <input type="date" id="todoDeadline" value="${todo?todo.deadline||'':''}">

    <label class="field-label">URL（任意）</label>
    <input type="url" id="todoUrl" placeholder="https://..." value="${todo?escapeHtml(todo.url||''):''}">
    ${todo && todo.url ? `<a class="modal-url-link" href="${escapeHtml(todo.url)}" target="_blank" rel="noopener noreferrer">🔗 ${escapeHtml(todo.url)}</a>` : ''}

    <label class="field-label">振り返りメモ（任意）</label>
    <textarea id="todoMemo" placeholder="気づき・反省点など">${todo?escapeHtml(todo.memo||''):''}</textarea>

    ${isEdit && todo.recurrence ? `<p class="checkbox-hint" style="margin-top:10px;">🔁 定期イベント：${describeRecurrence(todo.recurrence)}（定期設定は作成時のみ変更できます）</p>` : ''}

    ${!isEdit ? `
      <label class="field-label">定期イベント</label>
      <select id="todoRecurFreq">
        <option value="none">なし</option>
        <option value="daily">毎日</option>
        <option value="weekly">毎週</option>
        <option value="monthly">毎月</option>
        <option value="yearly">毎年</option>
        <option value="custom">カスタム</option>
      </select>

      <div id="customRecurBox" style="display:none;">
        <label class="field-label">間隔</label>
        <div style="display:flex; gap:8px; align-items:center;">
          <input type="number" id="recurInterval" min="1" value="1" style="width:80px;">
          <select id="recurUnit" style="flex:1;">
            <option value="day">日</option>
            <option value="week">週</option>
            <option value="month">か月</option>
            <option value="year">年</option>
          </select>
        </div>

        <div id="recurWeekBox" style="display:none;">
          <label class="field-label">期限の曜日</label>
          <select id="recurWeekday">${weekdayOptions}</select>
        </div>

        <div id="recurMonthBox" style="display:none;">
          <label class="field-label">毎月の基準</label>
          <select id="recurMonthMode">
            <option value="date">毎月同じ日（例：毎月1日）</option>
            <option value="weekday">毎月同じ曜日（例：毎月第1日曜日）</option>
          </select>
        </div>
      </div>
    ` : ''}

    ${isEdit && displayStatus==='REVIEW' ? `<p class="checkbox-hint" style="color:var(--review);font-weight:700;margin-top:10px;">📌 復習リマインド：内容を復習したら「DOにする」を押してください。</p>` : ''}

    ${isEdit ? `
      <div class="btn-row">
        <button class="btn btn-to btn-sm" id="btnMarkTo" ${todo.status!=='DO'?'style="display:none;"':''}>TOに戻す</button>
        <button class="btn btn-do btn-sm" id="btnMarkDo" ${(todo.status!=='DO' || displayStatus==='REVIEW')?'':'style="display:none;"'}>DOにする</button>
      </div>
    ` : ''}

    <div class="btn-row">
      ${isEdit ? `<button class="btn btn-danger" id="btnDeleteTodo">削除</button>` : ''}
      <button class="btn btn-primary" id="modalSaveTodo">${isEdit ? '保存する' : '作成する'}</button>
    </div>
  `;
  overlay.classList.remove('hidden');
  document.getElementById('modalCloseX').onclick = closeModal;

  if(!isEdit){
    const freqSelect = document.getElementById('todoRecurFreq');
    const customBox = document.getElementById('customRecurBox');
    const unitSelect = document.getElementById('recurUnit');
    const weekBox = document.getElementById('recurWeekBox');
    const monthBox = document.getElementById('recurMonthBox');
    const updateRecurUI = ()=>{
      customBox.style.display = freqSelect.value==='custom' ? 'block' : 'none';
      weekBox.style.display = (freqSelect.value==='custom' && unitSelect.value==='week') ? 'block' : 'none';
      monthBox.style.display = (freqSelect.value==='custom' && unitSelect.value==='month') ? 'block' : 'none';
    };
    freqSelect.addEventListener('change', updateRecurUI);
    unitSelect.addEventListener('change', updateRecurUI);
    updateRecurUI();
  }

  if(isEdit){
    document.getElementById('btnMarkDo').onclick = async ()=>{
      todo.status = 'DO';
      todo.doneAt = todayStr();
      await saveData();
      closeModal();
      render();
    };
    document.getElementById('btnMarkTo').onclick = async ()=>{
      todo.status = 'TO';
      todo.doneAt = null;
      await saveData();
      closeModal();
      render();
    };
    document.getElementById('btnDeleteTodo').onclick = ()=>{
      if(todo.recurrence){
        openDeleteRecurringChoice(todo);
      }else{
        confirmAndDeleteSingleTodo(todo.id);
      }
    };
  }

  document.getElementById('modalSaveTodo').onclick = async ()=>{
    const itemId = document.getElementById('todoItem').value;
    const title = document.getElementById('todoTitle').value.trim();
    const deadline = document.getElementById('todoDeadline').value;
    const url = document.getElementById('todoUrl').value.trim();
    const memo = document.getElementById('todoMemo').value.trim();
    if(!title){ alert('タイトルを入力してください'); return; }
    if(!deadline){ alert('期限を入力してください'); return; }

    if(isEdit){
      todo.itemId = itemId;
      todo.title = title;
      todo.deadline = deadline;
      todo.url = url;
      todo.memo = memo;
      await saveData();
    }else{
      const freq = document.getElementById('todoRecurFreq').value;
      let recurrence = null;

      if(freq !== 'none'){
        let unit, interval, weekday=null, monthMode=null, monthWeekOfMonth=null, monthWeekday=null;
        if(freq==='daily'){ unit='day'; interval=1; }
        else if(freq==='weekly'){ unit='week'; interval=1; weekday=new Date(deadline+'T00:00:00').getDay(); }
        else if(freq==='monthly'){ unit='month'; interval=1; monthMode='date'; }
        else if(freq==='yearly'){ unit='year'; interval=1; }
        else if(freq==='custom'){
          interval = Math.max(1, parseInt(document.getElementById('recurInterval').value,10) || 1);
          unit = document.getElementById('recurUnit').value;
          if(unit==='week'){
            weekday = parseInt(document.getElementById('recurWeekday').value,10);
          }else if(unit==='month'){
            monthMode = document.getElementById('recurMonthMode').value;
            if(monthMode==='weekday'){
              const pattern = deriveMonthWeekdayPattern(deadline);
              monthWeekOfMonth = pattern.weekOfMonth;
              monthWeekday = pattern.weekday;
            }
          }
        }

        let startDate = deadline;
        if(unit==='week'){
          startDate = alignToWeekday(deadline, weekday);
        }

        recurrence = {
          seriesId: uid(), freq, unit, interval, startDate,
          weekday, monthMode, monthWeekOfMonth, monthWeekday
        };
      }

      appData.todos.push({
        id: uid(), itemId, title,
        deadline: recurrence ? recurrence.startDate : deadline,
        url, memo,
        status: 'TO', doneAt: null, createdAt: Date.now(),
        recurrence
      });

      if(recurrence) ensureSeriesGenerated(recurrence.seriesId);
      await saveData();
    }
    closeModal();
    render();
  };
}

async function confirmAndDeleteSingleTodo(todoId){
  if(!confirm('このTOを削除しますか？')) return;
  appData.todos = appData.todos.filter(t=>t.id!==todoId);
  await saveData();
  closeModal();
  render();
}

function openDeleteRecurringChoice(todo){
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    <button class="modal-close-x" id="modalCloseX">✕</button>
    <div class="modal-handle"></div>
    <p class="modal-title">定期TOの削除</p>
    <p class="checkbox-hint">このTOには定期イベント設定（${describeRecurrence(todo.recurrence)}）があります。削除方法を選んでください。</p>
    <div class="btn-row" style="flex-direction:column;">
      <button class="btn btn-outline btn-block" id="delOnlyThis" style="margin-bottom:8px;">この回だけ削除</button>
      <button class="btn btn-danger btn-block" id="delAllSeries" style="margin-bottom:8px;">シリーズ全て削除</button>
      <button class="btn btn-outline btn-block" id="delCancel">キャンセル</button>
    </div>
  `;
  document.getElementById('modalCloseX').onclick = closeModal;
  document.getElementById('delCancel').onclick = closeModal;
  document.getElementById('delOnlyThis').onclick = async ()=>{
    appData.todos = appData.todos.filter(t=>t.id!==todo.id);
    await saveData();
    closeModal();
    render();
  };
  document.getElementById('delAllSeries').onclick = async ()=>{
    if(!confirm('このシリーズの全てのTOを削除します。よろしいですか？')) return;
    const seriesId = todo.recurrence.seriesId;
    appData.todos = appData.todos.filter(t=>!(t.recurrence && t.recurrence.seriesId===seriesId));
    await saveData();
    closeModal();
    render();
  };
}

function closeModal(){
  document.getElementById('modalOverlay').classList.add('hidden');
}

/* ==========================================================
   イベント割り当て
   ========================================================== */
function attachScreenEvents(){
  const screen = document.getElementById('screen');

  screen.querySelectorAll('[data-open-todo]').forEach(el=>{
    el.addEventListener('click', ()=> openTodoModal(el.dataset.openTodo));
  });

  const btnCreateItemTop = document.getElementById('btnCreateItemTop');
  if(btnCreateItemTop) btnCreateItemTop.addEventListener('click', ()=> openItemModal());

  const btnCreateItemList = document.getElementById('btnCreateItemList');
  if(btnCreateItemList) btnCreateItemList.addEventListener('click', ()=> openItemModal());

  const btnGoItems = document.getElementById('btnGoItems');
  if(btnGoItems) btnGoItems.addEventListener('click', ()=> switchTab('items'));

  screen.querySelectorAll('[data-toggle-chart-item]').forEach(el=>{
    el.addEventListener('click', ()=> toggleChartItemVisibility(el.dataset.toggleChartItem));
  });
  const btnShowAllCharts = document.getElementById('btnShowAllCharts');
  if(btnShowAllCharts) btnShowAllCharts.addEventListener('click', async ()=>{
    appData.settings.hiddenChartItemIds = [];
    await saveData();
    render();
  });
  const btnHideAllCharts = document.getElementById('btnHideAllCharts');
  if(btnHideAllCharts) btnHideAllCharts.addEventListener('click', async ()=>{
    appData.settings.hiddenChartItemIds = appData.items.map(it=>it.id);
    await saveData();
    render();
  });

  const itemSelect = document.getElementById('itemSelect');
  if(itemSelect) itemSelect.addEventListener('change', (e)=>{
    selectedItemId = e.target.value;
    render();
  });

  const btnCreateTodo = document.getElementById('btnCreateTodo');
  if(btnCreateTodo) btnCreateTodo.addEventListener('click', ()=> openTodoModal(null));

  screen.querySelectorAll('[data-open-item]').forEach(el=>{
    el.addEventListener('click', ()=>{
      selectedItemId = el.dataset.openItem;
      switchTab('schedule');
    });
  });

  screen.querySelectorAll('[data-edit-item]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      openItemModal(el.dataset.editItem);
    });
  });

  screen.querySelectorAll('[data-delete-item]').forEach(el=>{
    el.addEventListener('click', async (e)=>{
      e.stopPropagation();
      const id = el.dataset.deleteItem;
      if(!confirm('このアイテムと、紐づくすべてのTO/DOを削除しますか？')) return;
      appData.items = appData.items.filter(i=>i.id!==id);
      appData.todos = appData.todos.filter(t=>t.itemId!==id);
      if(selectedItemId===id) selectedItemId = null;
      await saveData();
      render();
    });
  });

  const calPrev = document.getElementById('calPrev');
  if(calPrev) calPrev.addEventListener('click', ()=>{
    calendarViewDate = new Date(calendarViewDate.getFullYear(), calendarViewDate.getMonth()-1, 1);
    render();
  });
  const calNext = document.getElementById('calNext');
  if(calNext) calNext.addEventListener('click', ()=>{
    calendarViewDate = new Date(calendarViewDate.getFullYear(), calendarViewDate.getMonth()+1, 1);
    render();
  });
  screen.querySelectorAll('[data-cal-date]').forEach(el=>{
    el.addEventListener('click', ()=>{
      selectedCalDate = el.dataset.calDate;
      render();
    });
  });
}

/* ==========================================================
   起動
   ========================================================== */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=> switchTab(btn.dataset.tab));
});
document.getElementById('titleEditBtn').addEventListener('click', openTitleModal);

(async function init(){
  await loadData();
  if(!storageAvailable) showStorageWarning();
  switchTab('top');
})();
</script>
</body>
</html>
